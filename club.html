  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n>\n        <span style=\"font-family:'Oswald',sans-serif;font-weight:300;font-size:15px;letter-spacing:.26em\">ROASTERS<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fa>\n    <a href=\"#join\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.12em;text-transform:uppercase;background:#F1E7D2;color:#2A1C12;padding:11px 20px;border-radius:4px;white-space:nowrap\" style-hover=\"background:#fff\">Reserve a spot<\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- HERO -->\n<section class=\"grain\" style=\"position:relative;background:#1A3A82;color:#fff;overflow:hidden\">\n  <div style=\"position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:clamp(54px,8vw,104px) clamp(20px,5vw,40px);display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(36px,5vw,64px);align-items:center\">\n    <div>\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:500;font-size:12px;letter-spacing:.2em;text-transform:uppercase;border:1.5px solid rgba(245,197,24,.6);border-radius:999px;padding:6px 14px;color:#F5C518\">Members only · limited availability<\u002Fdiv>\n      <h1 style=\"font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;line-height:.92;letter-spacing:.02em;font-size:clamp(50px,8vw,98px);margin:18px 0 0;color:#F5C518\">The<br>5–11 Club<\u002Fh1>\n      <p style=\"max-width:460px;font-size:clamp(15px,1.4vw,17px);line-height:1.6;color:rgba(255,255,255,.88);margin:20px 0 0\">Club members are family — the early risers we see every morning on their way to start the day. Unlimited drip from 5 to 11, 10% off everything else on the menu, and a place that treats you like one of our own.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:30px\">\n        <a href=\"#join\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;background:#F5C518;color:#1A3A82;padding:15px 26px;border-radius:4px\" style-hover=\"background:#FFD949\">Claim your spot<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:center\">\n      <sc-if value=\"{{ showShield }}\" hint-placeholder-val=\"{{ true }}\">\n        <svg viewBox=\"0 0 320 350\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Route 511 coffee club shield\" style=\"width:min(300px,70vw);height:auto;filter:drop-shadow(0 16px 34px rgba(0,0,0,.35))\">\n          <path d=\"M 70 335 L 250 335 Q 260 335 262.3 325.3 L 305.9 137.5 Q 310 120 294.6 110.7 L 175.4 39.3 Q 160 30 144.6 39.3 L 25.4 110.7 Q 10 120 14.1 137.5 L 57.7 325.3 Q 60 335 70 335 Z\" fill=\"#1A3A82\" stroke=\"#1A3A82\" stroke-width=\"2\"><\u002Fpath>\n          <path d=\"M 82 322 L 238 322 Q 248 322 250.3 312.3 L 289.4 145.6 Q 293 130 279.4 121.5 L 173.6 55.5 Q 160 47 146.4 55.5 L 40.6 121.5 Q 27 130 30.7 145.6 L 69.7 312.3 Q 72 322 82 322 Z\" fill=\"#1A3A82\" stroke=\"#F5C518\" stroke-width=\"3\"><\u002Fpath>\n          <text x=\"160\" y=\"141\" text-anchor=\"middle\" font-family=\"Oswald, 'Arial Narrow', sans-serif\" font-weight=\"500\" font-size=\"30\" fill=\"#F5C518\" letter-spacing=\"2\">COFFEE<\u002Ftext>\n          <text x=\"160\" y=\"250\" text-anchor=\"middle\" font-family=\"Oswald, 'Arial Narrow', sans-serif\" font-weight=\"700\" font-size=\"132\" fill=\"#F5C518\" letter-spacing=\"2\">511<\u002Ftext>\n          <text x=\"160\" y=\"285\" text-anchor=\"middle\" font-family=\"Oswald, 'Arial Narrow', sans-serif\" font-weight=\"500\" font-size=\"30\" fill=\"#F5C518\" letter-spacing=\"2\">CLUB<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showCard }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:relative;width:min(380px,86vw);aspect-ratio:1.586;border-radius:14px;padding:22px 24px;color:#F5C518;background:#16295B;box-shadow:0 18px 44px rgba(0,0,0,.4);overflow:hidden\">\n          <div style=\"position:absolute;inset:9px;border:2px solid #F5C518;border-radius:9px;opacity:.7;pointer-events:none\"><\u002Fdiv>\n          <div><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.04em;text-transform:uppercase;color:#fff;line-height:1\">Ringwood Ave Roasters<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-top:4px\">The 5–11 Club<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:50px;letter-spacing:.04em;margin-top:14px\">511<\u002Fdiv>\n          <div style=\"font-family:'Oswald',sans-serif;font-weight:400;font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.85\">${{ priceMonthly }} / month · unlimited 5–11am drip<\u002Fdiv>\n          <div style=\"position:absolute;left:24px;bottom:20px;right:24px;display:flex;justify-content:space-between;align-items:flex-end\">\n            <div><div style=\"font-family:'Oswald',sans-serif;font-weight:400;font-size:10px;letter-spacing:.12em;opacity:.7\">Member<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:14px;letter-spacing:.06em;color:#fff\">No. 042<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Oswald',sans-serif;font-weight:400;font-size:10px;letter-spacing:.12em;opacity:.7\">Since<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:14px;letter-spacing:.06em;color:#fff\">2026<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BENEFITS -->\n<section style=\"max-width:1180px;margin:0 auto;padding:clamp(54px,8vw,96px) clamp(20px,5vw,40px)\">\n  <div class=\"rv\" style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:rgba(42,28,18,.55)\">What you get<\u002Fdiv>\n  <h2 class=\"rv\" style=\"font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.02em;font-size:clamp(32px,4.6vw,54px);margin:10px 0 0\">Four good reasons<br>to get up early<\u002Fh2>\n  <div class=\"rv\" style=\"margin-top:38px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px\">\n    <div style=\"background:#F6EFE0;border:1px solid rgba(42,28,18,.16);border-radius:10px;padding:26px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:34px;color:#1A3A82\">01<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;letter-spacing:.03em;text-transform:uppercase;margin-top:10px\">Unlimited 5–11 Drip<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:rgba(42,28,18,.7);margin:8px 0 0\">House drip, every morning from 5 to 11. Bottomless, full stop.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F6EFE0;border:1px solid rgba(42,28,18,.16);border-radius:10px;padding:26px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:34px;color:#1A3A82\">02<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;letter-spacing:.03em;text-transform:uppercase;margin-top:10px\">10% Off Everything Else<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:rgba(42,28,18,.7);margin:8px 0 0\">Every sandwich, smoothie, espresso drink, and bag of beans on the menu — family doesn't pay full price.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F6EFE0;border:1px solid rgba(42,28,18,.16);border-radius:10px;padding:26px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:34px;color:#1A3A82\">03<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;letter-spacing:.03em;text-transform:uppercase;margin-top:10px\">A Standing Tab<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:rgba(42,28,18,.7);margin:8px 0 0\">Walk in, get your cup and your breakfast, walk out. Your tab settles automatically at the end of each week, billed to the card you signed up with.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#F6EFE0;border:1px solid rgba(42,28,18,.16);border-radius:10px;padding:26px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:34px;color:#1A3A82\">04<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;letter-spacing:.03em;text-transform:uppercase;margin-top:10px\">Bring-a-Neighbor Pass<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:rgba(42,28,18,.7);margin:8px 0 0\">One free morning drip a week for a friend.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section style=\"background:#F6EFE0;border-top:1px solid rgba(42,28,18,.14);border-bottom:1px solid rgba(42,28,18,.14)\">\n  <div class=\"rv\" style=\"max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,84px) clamp(20px,5vw,40px)\">\n    <h2 style=\"font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.02em;font-size:clamp(28px,3.6vw,42px);margin:0 0 30px\">How it works<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:28px\">\n      <div style=\"display:flex;gap:16px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:24px;color:#1A3A82;flex:none\">A.<\u002Fdiv><div><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.03em;text-transform:uppercase\">Reserve a spot<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:rgba(42,28,18,.7);margin:6px 0 0\">Fill out the form below. Founding spots are first come, first served — we'll confirm yours by email.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:16px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:24px;color:#1A3A82;flex:none\">B.<\u002Fdiv><div><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.03em;text-transform:uppercase\">Get set up<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:rgba(42,28,18,.7);margin:6px 0 0\">When we open, stop in, meet the bar, and we'll get your membership set up on the spot.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:16px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:24px;color:#1A3A82;flex:none\">C.<\u002Fdiv><div><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.03em;text-transform:uppercase\">Drink it down<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:rgba(42,28,18,.7);margin:6px 0 0\">${{ priceMonthly }}/month. Pause it for the summer if you head down the shore.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- JOIN FORM -->\n<section id=\"join\" class=\"grain\" style=\"scroll-margin-top:80px;position:relative;background:#1A3A82;color:#fff;overflow:hidden\">\n  <div class=\"rv\" style=\"position:relative;z-index:1;max-width:780px;margin:0 auto;padding:clamp(54px,8vw,100px) clamp(20px,5vw,40px)\">\n    <div style=\"text-align:center\">\n      <div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.75)\">${{ priceMonthly }} / month · limited availability<\u002Fdiv>\n      <h2 style=\"font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.02em;font-size:clamp(34px,5vw,60px);margin:12px 0 0;color:#F5C518\">Reserve your spot<\u002Fh2>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:36px;background:#16295B;border:2px solid #F5C518;border-radius:14px;padding:clamp(28px,4vw,44px);text-align:center\">\n        <div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#F5C518\">✦ Spot reserved<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.6;color:rgba(255,255,255,.88);margin:16px auto 0;max-width:420px\">Welcome to the family, {{ memberName }}. You're on the founders list — we'll email you before opening day to get your membership set up and start your tab. See you at 5.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form onsubmit=\"{{ onJoin }}\" style=\"margin-top:36px;background:#16295B;border:1px solid rgba(245,197,24,.35);border-radius:14px;padding:clamp(24px,4vw,40px);display:grid;gap:18px\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px\">\n          <label style=\"display:flex;flex-direction:column;gap:7px\"><span style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.75)\">Name<\u002Fspan><input name=\"name\" required=\"\" placeholder=\"First &amp; last\" class=\"fld\" style=\"background:#101F45;border:1px solid rgba(255,255,255,.28);color:#fff;font-family:'Source Sans 3',sans-serif;font-size:15px;padding:13px 14px;border-radius:6px;outline:none\"><\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:7px\"><span style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.75)\">Email<\u002Fspan><input name=\"email\" type=\"email\" required=\"\" placeholder=\"you@email.com\" class=\"fld\" style=\"background:#101F45;border:1px solid rgba(255,255,255,.28);color:#fff;font-family:'Source Sans 3',sans-serif;font-size:15px;padding:13px 14px;border-radius:6px;outline:none\"><\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px\">\n          <label style=\"display:flex;flex-direction:column;gap:7px\"><span style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.75)\">Phone<\u002Fspan><input name=\"phone\" required=\"\" placeholder=\"(973) 555–0000\" class=\"fld\" style=\"background:#101F45;border:1px solid rgba(255,255,255,.28);color:#fff;font-family:'Source Sans 3',sans-serif;font-size:15px;padding:13px 14px;border-radius:6px;outline:none\"><\u002Flabel>\n          <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <span style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.75)\">If the club went beyond coffee, what would you like to see?<\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <label style=\"display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(255,255,255,.88);background:#101F45;border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;cursor:pointer\"><input type=\"checkbox\" name=\"grab\" value=\"Yogurt + fruit + granola\" style=\"accent-color:#F5C518;width:15px;height:15px\">Yogurt + fruit + granola<\u002Flabel>\n            <label style=\"display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(255,255,255,.88);background:#101F45;border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;cursor:pointer\"><input type=\"checkbox\" name=\"grab\" value=\"Overnight oats\" style=\"accent-color:#F5C518;width:15px;height:15px\">Overnight oats<\u002Flabel>\n            <label style=\"display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(255,255,255,.88);background:#101F45;border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;cursor:pointer\"><input type=\"checkbox\" name=\"grab\" value=\"Fresh fruit cup\" style=\"accent-color:#F5C518;width:15px;height:15px\">Fresh fruit cup<\u002Flabel>\n            <label style=\"display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(255,255,255,.88);background:#101F45;border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;cursor:pointer\"><input type=\"checkbox\" name=\"grab\" value=\"Fresh juice\" style=\"accent-color:#F5C518;width:15px;height:15px\">Fresh juice<\u002Flabel>\n            <label style=\"display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(255,255,255,.88);background:#101F45;border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;cursor:pointer\"><input type=\"checkbox\" name=\"grab\" value=\"Infused water\" style=\"accent-color:#F5C518;width:15px;height:15px\">Infused water<\u002Flabel>\n            <label style=\"display:flex;align-items:center;gap:8px;font-size:14px;color:rgba(255,255,255,.88);background:#101F45;border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;cursor:pointer\"><input type=\"checkbox\" name=\"grab\" value=\"Iced tea\" style=\"accent-color:#F5C518;width:15px;height:15px\">Iced tea<\u002Flabel>\n          <\u002Fdiv>\n          <input name=\"grabOther\" placeholder=\"Something else you'd grab? Write it in…\" class=\"fld\" style=\"background:#101F45;border:1px solid rgba(255,255,255,.28);color:#fff;font-family:'Source Sans 3',sans-serif;font-size:15px;padding:13px 14px;border-radius:6px;outline:none\">\n        <\u002Fdiv>\n        <button type=\"submit\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.12em;text-transform:uppercase;background:#F5C518;color:#1A3A82;padding:16px;border-radius:6px;border:0;cursor:pointer\" style-hover=\"background:#FFD949\">{{ joinLabel }}<\u002Fbutton>\n        <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-size:13px;line-height:1.5;color:#FFD949;margin:0;text-align:center\">Something went wrong sending your reservation — please try again, or email <a href=\"mailto:james.isgro@gmail.com\" style=\"text-decoration:underline\">james.isgro@gmail.com<\u002Fa>.<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Fform>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section style=\"max-width:780px;margin:0 auto;padding:clamp(48px,7vw,84px) clamp(20px,5vw,40px)\">\n  <h2 class=\"rv\" style=\"font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.02em;font-size:clamp(28px,3.6vw,42px);margin:0 0 26px\">Questions<\u002Fh2>\n  <div class=\"rv\" style=\"display:flex;flex-direction:column\">\n    <div style=\"padding:18px 0;border-top:1px solid rgba(42,28,18,.18)\"><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.02em;text-transform:uppercase\">What counts as \"unlimited\"?<\u002Fdiv><p style=\"font-size:15px;line-height:1.6;color:rgba(42,28,18,.72);margin:8px 0 0\">House drip between 5 and 11am, refilled as many times as you like. Everything else on the menu is 10% off, any time of day.<\u002Fp><\u002Fdiv>\n    <div style=\"padding:18px 0;border-top:1px solid rgba(42,28,18,.18)\"><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.02em;text-transform:uppercase\">Why is membership limited?<\u002Fdiv><p style=\"font-size:15px;line-height:1.6;color:rgba(42,28,18,.72);margin:8px 0 0\">We want to make sure every member gets the level of service our family deserves — so we'll only take on as many members as we can serve to our standards.<\u002Fp><\u002Fdiv>\n    <div style=\"padding:18px 0;border-top:1px solid rgba(42,28,18,.18)\"><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.02em;text-transform:uppercase\">When does billing start?<\u002Fdiv><p style=\"font-size:15px;line-height:1.6;color:rgba(42,28,18,.72);margin:8px 0 0\">Not until we open. Reserving a spot costs nothing — your first month starts the day you activate your membership.<\u002Fp><\u002Fdiv>\n    <div style=\"padding:18px 0;border-top:1px solid rgba(42,28,18,.18);border-bottom:1px solid rgba(42,28,18,.18)\"><div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.02em;text-transform:uppercase\">Can I pause it?<\u002Fdiv><p style=\"font-size:15px;line-height:1.6;color:rgba(42,28,18,.72);margin:8px 0 0\">Anytime — head down the shore for August and pick it back up in September. Your number's held.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"background:#2A1C12;color:#F1E7D2\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:clamp(40px,6vw,64px) clamp(20px,5vw,40px) 30px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;align-items:center\">\n    <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.08em;text-transform:uppercase\">Ringwood Ave Roasters<\u002Fdiv>\n    <a href=\"./index.html\" style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:.1em;text-transform:uppercase\" style-hover=\"opacity:.7\">← Back to home<\u002Fa>\n  <\u002Fdiv>\n  <div style=\"max-width:1180px;margin:0 auto;padding:18px clamp(20px,5vw,40px) 40px;border-top:1px solid rgba(241,231,210,.16);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;letter-spacing:.06em;color:rgba(241,231,210,.55)\">\n    <span>© 2026 Ringwood Ave Roasters · 1089 Ringwood Ave, Haskell, NJ<\u002Fspan>\n    <span style=\"font-family:'Oswald',sans-serif;letter-spacing:.16em;text-transform:uppercase\">Family Run<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;monthlyPrice&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:50,&quot;min&quot;:10,&quot;max&quot;:150,&quot;unit&quot;:&quot;$&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Membership&quot;},&quot;heroMark&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;shield&quot;,&quot;options&quot;:[&quot;shield&quot;,&quot;card&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  state = { submitted: false, memberName: '', sending: false, error: false };\n  ENDPOINT = 'https://formspree.io/f/mrewwgld';\n  componentDidMount() {\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); this._io.unobserve(e.target); } });\n    }, { threshold: 0.1 });\n    requestAnimationFrame(() => document.querySelectorAll('.rv').forEach((n) => this._io.observe(n)));\n  }\n  componentWillUnmount() { this._io && this._io.disconnect(); }\n  renderVals() {\n    return {\n      priceMonthly: this.props.monthlyPrice ?? 50,\n      showShield: (this.props.heroMark ?? 'shield') !== 'card',\n      showCard: (this.props.heroMark ?? 'shield') === 'card',\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      hasError: this.state.error,\n      memberName: (this.state.memberName || '').split(' ')[0] || 'neighbor',\n      joinLabel: this.state.sending ? 'Sending…' : 'Reserve my spot',\n      onJoin: async (e) => {\n        e.preventDefault();\n        if (this.state.sending) return;\n        const f = e.target.elements;\n        const data = {\n          form: '5-11 Club Reservation',\n          name: f.name.value,\n          email: f.email.value,\n          phone: f.phone.value,\n          morning_grab: Array.from(e.target.querySelectorAll('input[name=\"grab\"]:checked')).map((i) => i.value).join(', '),\n          grab_other: (f.grabOther && f.grabOther.value) || '',\n          _subject: 'New 5-11 Club reservation',\n        };\n        this.setState({ sending: true, error: false });\n        try {\n          const r = await fetch(this.ENDPOINT, {\n            method: 'POST',\n            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },\n            body: JSON.stringify(data),\n          });\n          if (!r.ok) throw new Error('send failed');\n          this.setState({ submitted: true, memberName: data.name, sending: false });\n        } catch (err) {\n          this.setState({ error: true, sending: false });\n        }\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
